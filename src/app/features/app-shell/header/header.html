<header class="header relative h-full border-b border-(--app-border-color) bg-(--header-bg) backdrop-blur-md" [class.mobile-menu-open]="mobileMenuOpen()" role="banner">
  <div class="mx-auto flex h-full max-w-7xl items-center justify-between gap-8 px-6 max-[1100px]:gap-4 max-[1100px]:px-4">
    <a href="#inicio" class="group flex shrink-0 items-baseline gap-[0.05rem] no-underline" aria-label="Ir al inicio - Liriraid" (click)="onNavLinkClick($event, '#inicio', 'inicio')">
      <span class="text-xl font-bold tracking-[-0.02em] text-(--app-text-color) transition-colors group-hover:text-(--app-text-primary)"> Liriraid </span>
      <span class="text-2xl font-bold leading-none text-(--app-text-primary)" aria-hidden="true">.</span>
    </a>

    <nav class="header-nav flex flex-1 items-center justify-center gap-2" aria-label="Navegación principal">
      @for (link of navLinks; track link.href) {
        <portfolio-button variant="text" [label]="link.label" [href]="link.href" [styleClass]="navLinkClass(link.sectionId)" (onClick)="onNavLinkClick($event, link.href, link.sectionId)" />
      }
    </nav>

    <div class="flex shrink-0 items-center gap-2">
      <portfolio-theme-color-picker />

      <span class="theme-toggle-slot relative inline-flex size-9 min-w-9 items-center justify-center">
        <portfolio-button variant="text" styleClass="icon-btn theme-toggle-btn theme-toggle-btn--dark" icon="Sun" iconSize="18" ariaLabel="Activar modo claro" (onClick)="toggleThemeMode()" />

        <portfolio-button variant="text" styleClass="icon-btn theme-toggle-btn theme-toggle-btn--light" icon="Moon" iconSize="18" ariaLabel="Activar modo oscuro" (onClick)="toggleThemeMode()" />
      </span>

      <span class="mobile-menu-slot relative hidden size-9 min-w-9 items-center justify-center">
        <portfolio-button variant="text" styleClass="icon-btn mobile-menu-btn mobile-menu-btn--open" icon="Menu" iconSize="20" ariaLabel="Abrir menú" (onClick)="toggleMobileMenu()" />

        <portfolio-button variant="text" styleClass="icon-btn mobile-menu-btn mobile-menu-btn--close" icon="Close" iconSize="20" ariaLabel="Cerrar menú" (onClick)="toggleMobileMenu()" />
      </span>
    </div>
  </div>

  @if (mobileMenuOpen()) {
    <nav class="mobile-nav absolute left-0 right-0 top-full z-99 flex flex-col gap-1 border-y border-(--app-border-color) bg-(--mobile-nav-bg) px-4 py-3 backdrop-blur-lg [box-shadow:0_8px_24px_-8px_rgba(0,0,0,0.25)]" aria-label="Navegación móvil">
      @for (link of navLinks; track link.href) {
        <portfolio-button variant="text" [label]="link.label" [href]="link.href" [styleClass]="mobileNavLinkClass(link.sectionId)" (onClick)="onNavLinkClick($event, link.href, link.sectionId); closeMobileMenu()" />
      }
    </nav>
  }
</header>
