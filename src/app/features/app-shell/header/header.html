<header class="header" role="banner">
  <div class="header-inner">
    <a href="#inicio" class="header-logo" aria-label="Ir al inicio - Liriraid" (click)="onNavLinkClick($event, '#inicio', 'inicio')">
      <span class="logo-text">Liriraid</span>
      <span class="logo-dot" aria-hidden="true">.</span>
    </a>

    <nav class="header-nav" aria-label="Navegación principal">
      @for (link of navLinks; track link.href) {
        <portfolio-button variant="text" [label]="link.label" [href]="link.href" [styleClass]="navLinkClass(link.sectionId)" (onClick)="onNavLinkClick($event, link.href, link.sectionId)" />
      }
    </nav>

    <div class="header-actions">
      <portfolio-theme-color-picker />

      <span class="theme-toggle-slot">
        <portfolio-button variant="text" styleClass="icon-btn theme-toggle-btn theme-toggle-btn--dark" icon="Sun" iconSize="18" ariaLabel="Activar modo claro" (onClick)="toggleThemeMode()" />

        <portfolio-button variant="text" styleClass="icon-btn theme-toggle-btn theme-toggle-btn--light" icon="Moon" iconSize="18" ariaLabel="Activar modo oscuro" (onClick)="toggleThemeMode()" />
      </span>

      <portfolio-button variant="text" styleClass="icon-btn mobile-menu-btn" [icon]="mobileMenuOpen() ? 'Close' : 'Menu'" iconSize="20" [ariaLabel]="mobileMenuOpen() ? 'Cerrar menú' : 'Abrir menú'" (onClick)="toggleMobileMenu()" />
    </div>
  </div>

  @if (mobileMenuOpen()) {
    <nav class="mobile-nav" aria-label="Navegación móvil">
      @for (link of navLinks; track link.href) {
        <portfolio-button variant="text" [label]="link.label" [href]="link.href" [styleClass]="mobileNavLinkClass(link.sectionId)" (onClick)="onNavLinkClick($event, link.href, link.sectionId); closeMobileMenu()" />
      }
    </nav>
  }
</header>
