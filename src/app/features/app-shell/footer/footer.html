<footer class="footer" role="contentinfo">
  <div class="footer-inner">
    <div class="footer-brand">
      <span class="footer-logo">Liriraid<span class="footer-dot">.</span></span>
      <p class="footer-tagline">{{ tagline() }}</p>
    </div>

    <div class="footer-links">
      <portfolio-button [label]="githubLabel()" techIcon="GitHub" href="https://github.com/liriraid" target="_blank" rel="noopener noreferrer" variant="text" [ariaLabel]="githubAria()" styleClass="footer-link-button text-caption-1-medium" />

      <portfolio-button [label]="contactLabel()" icon="Email" href="#contact" variant="text" [ariaLabel]="contactAria()" styleClass="footer-link-button text-caption-1-medium" />
    </div>

    <p class="footer-copy">{{ copyright() }}</p>
  </div>
</footer>
