<footer class="footer" role="contentinfo">
  <div class="footer-inner">
    <div class="footer-brand">
      <span class="footer-logo">Liriraid<span class="footer-dot">.</span></span>
      <p class="footer-tagline">Desarrollador Full Angular · TypeScript · Node.js</p>
    </div>

    <div class="footer-links">
      <a
        href="https://github.com/liriraid"
        target="_blank"
        rel="noopener noreferrer"
        class="footer-link"
        aria-label="GitHub de Gabriel Cruz"
      >
        <img src="https://skillicons.dev/icons?i=github" alt="GitHub" width="18" height="18" loading="lazy" style="border-radius:3px;vertical-align:middle;" />
        <span>GitHub</span>
      </a>
      <a
        href="/contacto"
        class="footer-link"
        aria-label="Ir al formulario de contacto"
        (click)="goToContact($event)"
      >
        <portfolio-icon name="Email" size="18" />
        <span>Contacto</span>
      </a>
    </div>

    <p class="footer-copy">
      © {{ year }} Gabriel Leonardo Cruz Flores · Hecho con Angular 21 + Tailwind CSS
    </p>
  </div>
</footer>
