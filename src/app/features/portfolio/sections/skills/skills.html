<section id="habilidades" class="section" aria-labelledby="skills-heading">
  <div class="section-inner">
    <header class="section-header">
      <p class="section-label">Tecnologías</p>
      <h2 id="skills-heading" class="section-title text-tittle-4-bold">
        Habilidades técnicas
      </h2>
      <p class="section-subtitle text-body-1-regular">
        Herramientas y tecnologías que uso para construir productos robustos y mantenibles.
      </p>
    </header>

    <div class="skills-grid">
      @for (category of categories(); track category.label) {
        <div class="skill-category">
          <div class="skill-category-header">
            <div class="skill-icon-wrap" aria-hidden="true">
              <portfolio-icon [name]="category.icon" size="18" />
            </div>
            <h3 class="skill-category-title text-subtitle-2-bold">{{ category.label }}</h3>
          </div>
          <ul class="skill-list" role="list" [attr.aria-label]="'Habilidades de ' + category.label">
            @for (skill of category.skills; track skill) {
              <li class="skill-badge">{{ skill }}</li>
            }
          </ul>
        </div>
      }
    </div>
  </div>
</section>
