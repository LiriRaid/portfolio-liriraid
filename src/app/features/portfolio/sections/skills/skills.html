<section id="skills" class="skills flex min-h-(--app-section-min-height) flex-col justify-center  py-(--s-py)" aria-labelledby="skills-heading">
  <div class="portfolio-section-container portfolio-section-reveal flex flex-col gap-(--s-section-gap)">
    <header #headerRef class="flex max-w-(--s-header-max) flex-col gap-(--s-header-gap)">
      <p class="skills-label m-0 text-caption-2-bold">
        {{ header().label }}
      </p>

      <h2 id="skills-heading" class="skills-title m-0 text-tittle-4-bold">
        {{ header().title }}
      </h2>

      <p class="skills-subtitle m-0 text-body-1-regular">
        {{ header().subtitle }}
      </p>
    </header>

    <div #gridRef class="skills-grid grid gap-(--s-grid-gap)">
      @for (category of categories(); track category.label) {
        <article portfolioAnimatedBorder class="skill-category flex min-w-0 flex-col gap-(--s-card-gap) rounded-2xl border p-(--s-card-p)">
          <header class="flex items-center gap-(--s-card-header-gap)">
            <span class="skill-icon-wrap inline-flex shrink-0 items-center justify-center" aria-hidden="true">
              <portfolio-icon [name]="category.icon" size="18" extraClass="size-(--s-cat-icon)" />
            </span>

            <h3 class="skill-category-title m-0 text-subtitle-2-bold">
              {{ category.label }}
            </h3>
          </header>

          <ul class="m-0 flex list-none flex-wrap gap-(--s-list-gap) p-0" role="list" [attr.aria-label]="categoryAriaPrefix() + ' ' + category.label">
            @for (skill of category.skills; track skill) {
              <li class="skill-badge chip inline-flex items-center gap-(--chip-gap) whitespace-nowrap rounded-full border px-(--chip-px) py-(--chip-py) text-caption-1-medium">
                @if (techIconUrl(skill); as iconUrl) {
                  <img [src]="iconUrl" alt="" aria-hidden="true" class="skill-badge-icon shrink-0 rounded-[3px] object-contain" width="16" height="16" loading="lazy" decoding="async" />
                } @else {
                  <portfolio-icon class="skill-badge-icon" [name]="skillFallbackIcon(skill)" size="16" />
                }

                <span>{{ skill }}</span>
              </li>
            }
          </ul>
        </article>
      }
    </div>
  </div>
</section>
