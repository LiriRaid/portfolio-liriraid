<section id="contact" class="contact flex min-h-(--app-section-min-height) flex-col justify-center bg-(--app-shell-bg) py-(--c-py)" aria-labelledby="contact-heading">
  <div class="contact-inner portfolio-section-container portfolio-section-reveal">
    <div class="contact-layout grid items-center gap-(--c-layout-gap)">
      <div #contentRef class="contact-content flex flex-col gap-(--c-content-gap)">
        <p class="contact-label m-0 text-caption-2-bold">
          {{ contact().label }}
        </p>

        <h2 id="contact-heading" class="contact-title m-0 text-tittle-4-bold">
          {{ contact().titleStart }}<br />
          <span class="text-(--app-text-primary)">
            {{ contact().titleHighlight }}
          </span>
        </h2>

        <p class="contact-description m-0 max-w-(--c-desc-max) text-body-1-regular">
          {{ contact().description }}
        </p>

        <div class="contact-social flex flex-wrap gap-(--c-social-gap)">
          @for (link of socialLinks(); track link.techIcon) {
            <portfolio-button [label]="link.label" [techIcon]="link.techIcon" [href]="link.href" [target]="link.target" [rel]="link.rel" variant="outlined" [ariaLabel]="link.label" styleClass="rounded-2xl !border-(--app-border-color) text-body-2-medium" />
          }
        </div>
      </div>

      <div #formRef class="contact-form-wrap rounded-2xl border p-(--c-form-p)">
        <form [formGroup]="form" (ngSubmit)="onSubmit()" class="contact-form flex flex-col gap-(--c-form-gap)" novalidate>
          <portfolio-input formControlName="name" [label]="nameLabel()" [placeholder]="namePlaceholder()" type="text" variant="on" lucideIcon="User" iconPosition="left" autocomplete="name" />

          <portfolio-input formControlName="email" [label]="emailLabel()" [placeholder]="emailPlaceholder()" type="email" variant="on" lucideIcon="Email" iconPosition="left" autocomplete="email" />

          <div class="textarea textarea-default">
            <label for="contact-message" class="sr-only">{{ messageLabel() }}</label>

            <textarea id="contact-message" formControlName="message" class="contact-textarea text-caption-1-medium placeholder:text-(--app-text-subtle)" [placeholder]="messagePlaceholder()" rows="5" autocapitalize="sentences" autocorrect="on" spellcheck="true"></textarea>
          </div>

          <portfolio-button [label]="sending() ? submittingLabel() : submitLabel()" icon="Send" iconPos="right" iconSize="16" styleClass="w-full text-body-2-medium rounded-2xl contact-submit-btn" type="submit" [loading]="sending()" [disabled]="sending()" />
        </form>
      </div>
    </div>
  </div>
</section>
