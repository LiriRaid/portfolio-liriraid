<section id="sobre-mi" class="section" aria-labelledby="about-heading">
  <div class="section-inner">
    <div class="about-layout">
      <div class="about-content">
        <header class="section-header">
          <p class="section-label">{{ about.label }}</p>

          <h2 id="about-heading" class="section-title text-tittle-4-bold">
            {{ about.title }}
          </h2>
        </header>

        <div class="about-body">
          @for (paragraph of about.paragraphs; track paragraph) {
            <p class="about-text text-body-1-regular">
              {{ paragraph }}
            </p>
          }
        </div>

        <div class="about-cta">
          <portfolio-button [label]="about.ctaLabel" icon="ArrowRight" iconPos="right" styleClass="text-body-2-medium" (onClick)="scrollToContact()" />
        </div>
      </div>

      <div class="about-stats" aria-label="Estadísticas profesionales">
        @for (stat of stats; track stat.label) {
          <article class="stat-card">
            <span class="stat-value text-tittle-4-bold">{{ stat.value }}</span>
            <span class="stat-label text-caption-1-regular">{{ stat.label }}</span>
          </article>
        }
      </div>
    </div>
  </div>
</section>
