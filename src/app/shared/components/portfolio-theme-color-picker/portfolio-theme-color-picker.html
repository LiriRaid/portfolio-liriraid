<p-popover #panel styleClass="color-picker-panel">
  <div class="picker-content">
    <div class="picker-section">
      <p class="picker-label">Color primario</p>
      <div class="picker-grid">
        @for (color of primaryColors; track color.key) {
          <button
            type="button"
            class="color-swatch"
            [class.active]="currentPrimaryKey() === color.key"
            [style.background]="color.swatch"
            [title]="color.label"
            [attr.aria-label]="'Seleccionar color ' + color.label"
            [attr.aria-pressed]="currentPrimaryKey() === color.key"
            (click)="selectPrimary(color.key, panel)"
          >
            @if (currentPrimaryKey() === color.key) {
              <span class="swatch-check" aria-hidden="true">✓</span>
            }
          </button>
        }
      </div>
    </div>

    <div class="picker-section">
      <p class="picker-label">Superficie</p>
      <div class="picker-grid picker-grid--surface">
        @for (surface of surfaceColors; track surface.key) {
          <button
            type="button"
            class="color-swatch"
            [class.active]="currentSurfaceKey() === surface.key"
            [style.background]="surface.swatch"
            [title]="surface.label"
            [attr.aria-label]="'Seleccionar superficie ' + surface.label"
            [attr.aria-pressed]="currentSurfaceKey() === surface.key"
            (click)="selectSurface(surface.key)"
          >
            @if (currentSurfaceKey() === surface.key) {
              <span class="swatch-check" aria-hidden="true">✓</span>
            }
          </button>
        }
      </div>
    </div>
  </div>
</p-popover>

<button
  type="button"
  class="picker-trigger"
  aria-label="Seleccionar paleta de colores"
  title="Paleta de colores"
  (click)="toggle(panel, $event)"
>
  <portfolio-icon name="Palette" size="18" />
</button>
