@if (renderCollapsedMode()) {
  <!-- Desktop collapsed: mismo estilo del botón mobile, pero centrado y cuadrado -->
  <button type="button" aria-label="Buscar" (click)="toggleMobile()" class="button-outline border rounded-lg flex items-center justify-center sidebar-search-collapsed-btn">
    <portfolio-icon name="Search" size="18"></portfolio-icon>
  </button>
} @else {
  @if (!isMobile() || !mobileMode()) {
    <div class="input input-default bg-surface-100 focus-within:bg-surface-0 w-full" [class]="inputClass()">
      <portfolio-icon name="Search" size="18"></portfolio-icon>
      <input class="text-caption-1-medium w-full" [placeholder]="placeholder()" [formControl]="control()" (keyup)="onKeyup($event)" />
    </div>
  } @else {
    <button class="flex button-outline gap-2 border rounded-lg text-caption-1-medium items-center py-2.5 sm:py-0" (click)="toggleMobile()" type="button">
      <portfolio-icon name="Search" size="18"></portfolio-icon>
    </button>

    @if (showMobileInput()) {
      <div class="w-full" animate.enter="section-slide-in-out-enter" animate.leave="section-slide-in-out-leave">
        <div class="input input-default bg-surface-100 focus-within:bg-surface-0 w-full mt-4" [class]="inputClass()">
          <portfolio-icon name="Search" size="18"></portfolio-icon>
          <input class="text-caption-1-medium w-full" [placeholder]="placeholder()" [formControl]="control()" (keyup)="onKeyup($event)" />
        </div>
      </div>
    }
  }
}
