@if (renderCollapsedMode()) {
  <button type="button" aria-label="Buscar" class="button-outline border rounded-lg flex items-center justify-center search-collapsed-btn" (click)="toggleMobile()">
    <portfolio-icon name="Search" size="18"></portfolio-icon>
  </button>
} @else {
  @if (!isMobile() || !mobileMode()) {
    <div class="input input-default w-full" [class]="inputClass()">
      <portfolio-icon name="Search" size="18"></portfolio-icon>

      <input class="text-body-2-medium w-full" [placeholder]="placeholder()" [formControl]="control()" (keyup)="onKeyup($event)" />
    </div>
  } @else {
    <button type="button" aria-label="Buscar" class="button-outline border rounded-lg flex items-center justify-center search-collapsed-btn" (click)="toggleMobile()">
      <portfolio-icon name="Search" size="18"></portfolio-icon>
    </button>

    @if (showMobileInput()) {
      <div class="search-mobile-panel w-full" animate.enter="search-slide-in-out-enter" animate.leave="search-slide-in-out-leave">
        <div class="search-mobile-panel-inner">
          <div class="input input-default w-full" [class]="inputClass()">
            <portfolio-icon name="Search" size="18"></portfolio-icon>

            <input class="text-body-1-medium w-full" [placeholder]="placeholder()" [formControl]="control()" (keyup)="onKeyup($event)" />
          </div>
        </div>
      </div>
    }
  }
}
